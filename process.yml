name: 🎬 Process Video

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: "Direct video download URL"
        required: true
      caption:
        description: "Optional caption"
        required: false
        default: ""

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 🎞️ Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-liberation

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install groq google-genai requests

      - name: 🚀 Process Video
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          VIDEO_URL:          ${{ inputs.video_url }}
          CAPTION:            ${{ inputs.caption }}
        run: python process.py

      - name: 💾 Save processed video
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: processed-video
          path: workdir/final_*.mp4
          retention-days: 1
          if-no-files-found: ignore
