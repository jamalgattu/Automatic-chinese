name: 🎬 Chinese Video Translator Pipeline

on:
  push:
    paths:
      - "links.txt"       # Auto-triggers when you update links.txt
  workflow_dispatch:       # Also lets you run manually from GitHub UI
  schedule:
    - cron: "0 3 * * *"  # Runs every day at 3AM UTC (8:30AM IST)

jobs:
  translate-videos:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Get your repo files ──────────────────────────────────────────────
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      # ── 2. Setup Python ─────────────────────────────────────────────────────
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Install ffmpeg (pre-available on ubuntu, just making sure) ───────
      - name: 🎞️ Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-liberation

      # ── 4. Install Python packages ──────────────────────────────────────────
      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            yt-dlp \
            groq \
            google-generativeai \
            requests

      # ── 5. Run the pipeline ─────────────────────────────────────────────────
      - name: 🚀 Run Translation Pipeline
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python main.py

      # ── 6. Upload output videos as artifacts (backup) ───────────────────────
      - name: 💾 Save output videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: translated-videos
          path: workdir/final_*.mp4
          retention-days: 3
          if-no-files-found: ignore
