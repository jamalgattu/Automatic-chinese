name: 📸 Upload to Instagram

on:
  workflow_dispatch:
    inputs:
      file_id:
        description: "Telegram file_id of the processed video"
        required: true
      caption:
        description: "Instagram caption"
        required: true

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: pip install requests instagrapi

      - name: 📸 Upload to Instagram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
          INSTAGRAM_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}
          TELEGRAM_FILE_ID:   ${{ inputs.file_id }}
          INSTA_CAPTION:      ${{ inputs.caption }}
        run: python instagram_upload.py
