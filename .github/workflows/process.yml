name: Process Video to Shorts Format

on:
  repository_dispatch:
    types: [process_video]

jobs:
  process:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install python-telegram-bot requests
          apt-get update && apt-get install -y ffmpeg
      
      - name: Download and process video
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          FILE_ID: ${{ github.event.client_payload.file_id }}
          USER_ID: ${{ github.event.client_payload.user_id }}
          CHAT_ID: ${{ github.event.client_payload.chat_id }}
        run: |
          python process.py
      
      - name: Cleanup
        if: always()
        run: |
          rm -f /tmp/douyin_*.mp4
          rm -f /tmp/processed_*.mp4
